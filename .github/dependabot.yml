version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the pin + the trailing version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
  # NuGet dependencies (Aspire.Hosting*, MinVer) — central-managed in Directory.Packages.props.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
